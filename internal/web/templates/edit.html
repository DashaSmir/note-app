{{define "title"}}Редактировать заметку{{end}}
{{define "main"}}
    <h1>Редактировать заметку</h1>
    <form action="/note/edit/{{.ID}}" method="POST">
        <div style="margin-bottom:15px;">
            <label for="title" style="display:block; font-weight:600; margin-bottom:4px;">Заголовок</label>
            <input type="text" name="title" id="title" value="{{.Title}}" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:1rem;">
        </div>
        <div style="margin-bottom:20px;">
            <label for="content" style="display:block; font-weight:600; margin-bottom:4px;">Содержание</label>
            <textarea name="content" id="content" rows="6" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:1rem; resize:vertical;">{{.Content}}</textarea>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-success">Обновить</button>
            <a href="/note/view/{{.ID}}" class="btn btn-outline">Отмена</a>
        </div>
    </form>
{{end}}
